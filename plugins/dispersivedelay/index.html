<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>DispersiveDelay</title><link rel="stylesheet" href="../../css/style.css"></head>
<body>

<div class="plugin-header">
<span class="plugin-header-icon">DD</span>
<div class="plugin-header-content">
<h2 class="plugin-title">DispersiveDelay</h2>
<span class="plugin-badge">延迟 / 时间效果</span>
</div>
</div>

<div class="plugin-download" data-github="https://github.com/ManasWolrd/DispersiveDelay"></div>

<div class="plugin-description">
<p><strong>DispersiveDelay</strong> 是一个色散延迟效果器，模拟不同频率以不同速度传播的物理现象，产生独特的延时纹理。</p>
</div>

<script src="../../js/plugin-download.js"></script>

<div class="win-group">
<div class="win-group-title">功能特点</div>
<div class="section_content">
<ul class="feature-list">
<li><strong>色散延迟</strong> — 频率相关的延迟时间，高频快/低频慢</li>
<li><strong>反馈网络</strong> — 可调反馈与交叉反馈</li>
<li><strong>调制</strong> — LFO 调制色散曲线</li>
<li><strong>立体声</strong> — 支持立体声独立处理</li>
</ul>
</div>
</div>

<div class="win-group">
<div class="win-group-title">参数</div>
<div class="section_content">
<table>
<tr><th>参数</th><th>范围</th><th>说明</th></tr>
<tr><td>Dispersion</td><td>0 ~ 100</td><td>色散强度</td></tr>
<tr><td>Delay Time</td><td>1 ~ 2000 ms</td><td>基频延迟时间</td></tr>
<tr><td>Feedback</td><td>0 ~ 100%</td><td>反馈量</td></tr>
<tr><td>Mix</td><td>0 ~ 100%</td><td>干湿比</td></tr>
</table>
</div>
</div>

</body>
</html>
