<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>SteepFlanger</title><link rel="stylesheet" href="../../css/style.css"></head>
<body>

<div class="plugin-header">
<span class="plugin-header-icon">SF</span>
<div class="plugin-header-content">
<h2 class="plugin-title">SteepFlanger</h2>
<span class="plugin-badge">调制效果</span>
</div>
</div>

<div class="plugin-download" data-github="https://github.com/ManasWolrd/SteepFlanger"></div>
<script src="/js/plugin-download.js"></script>

<div class="plugin-description">
<p><strong>SteepFlanger</strong> 是一个基于 FIR 与 IIR 混合架构的<strong>镶边（Flanger）效果器</strong>插件，同时支持经典的 <strong>Barberpole（无尽斜坡）镶边</strong>模式。</p>
</div>

<div class="win-group">
<div class="win-group-title">功能特点</div>
<div class="section_content">
<div class="features-with-gui">
<div class="features-gui-image">
<img src="https://raw.githubusercontent.com/ManasWolrd/SteepFlanger/main/docs/gui.png" alt="SteepFlanger GUI" class="plugin-screenshot">
</div>
<div class="features-list-col">
<ul class="feature-list">
<li><strong>FIR 镶边</strong> — 基于有限冲激响应（FIR）的经典镶边，产生平滑、稳定的梳状滤波扫频效果</li>
<li><strong>IIR 镶边</strong> — 基于无限冲激响应（IIR）的镶边，比FIR下降更快，但在移动延迟时间时会造成高频震动</li>
<li><strong>Barberpole 镶边</strong> — 无尽斜坡镶边模式，制造出持续上升或下降的螺旋式扫频听感</li>
</ul>
</div>
</div>
</div>
</div>

<div class="win-group">
<div class="win-group-title">视频演示</div>
<div class="section_content">

</a>
</div>

</html>
