<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>VitalChorus</title><link rel="stylesheet" href="../../css/style.css"></head>
<body>

<div class="plugin-header">
<span class="plugin-header-icon">VC</span>
<div class="plugin-header-content">
<h2 class="plugin-title">VitalChorus</h2>
<span class="plugin-badge">合唱 / 调制</span>
</div>
</div>

<div class="plugin-download" data-github="https://github.com/ManasWolrd/VitalChorus"></div>

<div class="plugin-description">
<p><strong>VitalChorus</strong> 是一个立体声合唱效果器，通过多组延迟线调制模拟多个声部的自然音色增厚效果。</p>
</div>

<script src="../../js/plugin-download.js"></script>

<div class="win-group">
<div class="win-group-title">功能特点</div>
<div class="section_content">
<ul class="feature-list">
<li><strong>多声部</strong> — 4 声部独立延迟与调制</li>
<li><strong>LFO 波形</strong> — 正弦 / 三角 / 锯齿可选</li>
<li><strong>立体声加宽</strong> — 左右声道反相调制</li>
<li><strong>低通滤波</strong> — 可调高频阻尼</li>
</ul>
</div>
</div>

<div class="win-group">
<div class="win-group-title">参数</div>
<div class="section_content">
<table>
<tr><th>参数</th><th>范围</th><th>说明</th></tr>
<tr><td>Rate</td><td>0.1 ~ 10 Hz</td><td>LFO 速率</td></tr>
<tr><td>Depth</td><td>0 ~ 100%</td><td>调制深度</td></tr>
<tr><td>Delay</td><td>5 ~ 50 ms</td><td>基频延迟</td></tr>
<tr><td>Mix</td><td>0 ~ 100%</td><td>干湿比</td></tr>
</table>
</div>
</div>

</body>
</html>
