<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>GreenVocoder</title><link rel="stylesheet" href="../../css/style.css"></head>
<body>

<div class="plugin-header">
<span class="plugin-header-icon">GV</span>
<div class="plugin-header-content">
<h2 class="plugin-title">GreenVocoder</h2>
<span class="plugin-badge">声码器 / 频谱</span>
</div>
</div>

<div class="plugin-download" data-github="https://github.com/ManasWolrd/GreenVocoder"></div>

<div class="plugin-description">
<p><strong>GreenVocoder</strong> 是一个经典声码器效果器，将调制信号的频谱特征叠加到载波信号上，产生标志性的电子语音效果。</p>
</div>

<script src="../../js/plugin-download.js"></script>

<div class="win-group">
<div class="win-group-title">功能特点</div>
<div class="section_content">
<ul class="feature-list">
<li><strong>多频段声码</strong> — 可配置频段数量与频率分布</li>
<li><strong>载波选择</strong> — 外部输入 / 内部噪声 / 振荡器</li>
<li><strong>包络跟随</strong> — 可调攻击释放时间</li>
<li><strong>立体声</strong> — 支持 MS 处理模式</li>
</ul>
</div>
</div>

<div class="win-group">
<div class="win-group-title">参数</div>
<div class="section_content">
<table>
<tr><th>参数</th><th>范围</th><th>说明</th></tr>
<tr><td>Bands</td><td>4 ~ 32</td><td>频段数量</td></tr>
<tr><td>Attack</td><td>1 ~ 100 ms</td><td>包络攻击时间</td></tr>
<tr><td>Release</td><td>10 ~ 500 ms</td><td>包络释放时间</td></tr>
<tr><td>Mix</td><td>0 ~ 100%</td><td>干湿比</td></tr>
</table>
</div>
</div>

</body>
</html>
