<div class="lang-bar">
<a class="lang-link active" href="index.html">中文</a>
<a class="lang-link" href="en/index.html" onclick="setLangEN(event)">English</a>
</div>

<script>
function setLangEN(e) {
    e.preventDefault();
    var hash = window.location.hash;
    window.location.href = 'en/index.html' + hash;
}
function setLangZH(e) {
    e.preventDefault();
    var hash = window.location.hash;
    window.location.href = '../index.html' + hash;
}
</script>
